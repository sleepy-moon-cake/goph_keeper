version: "2"
sql:
  - engine: "postgresql" 
    schema: "internal/server/migrations/" 
    queries: "internal/server/db/query.sql"
    gen:
      go:
        package: "db"
        out: "internal/server/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "text"
            go_type: "string"
          - db_type: "varchar"
            go_type: "string"

  - engine: "sqlite" 
    schema: "internal/client/migrations/" 
    queries: "internal/client/db/query.sql"
    gen:
      go:
        package: "db"
        out: "internal/client/db"
        sql_package: "database/sql"